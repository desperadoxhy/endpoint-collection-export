name: Publish Plugin

on:
  push:
    tags:
      - "v*"
      - "*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate tag matches project version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(./gradlew -q printVersion --no-configuration-cache)"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag $TAG does not match Gradle version $VERSION"
            exit 1
          fi

      - name: Build plugin distribution
        run: ./gradlew buildPlugin --stacktrace

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          assets=(build/distributions/*.zip)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No plugin distribution found in build/distributions"
            exit 1
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" \
              --verify-tag \
              --generate-notes \
              --title "${GITHUB_REF_NAME}"
          fi

      - name: Publish to JetBrains Marketplace
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          JETBRAINS_MARKETPLACE_CHANNEL: ${{ secrets.JETBRAINS_MARKETPLACE_CHANNEL }}
          JETBRAINS_MARKETPLACE_HIDDEN: ${{ secrets.JETBRAINS_MARKETPLACE_HIDDEN }}
          JETBRAINS_CERTIFICATE_CHAIN: ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
          JETBRAINS_PRIVATE_KEY: ${{ secrets.JETBRAINS_PRIVATE_KEY }}
          JETBRAINS_PRIVATE_KEY_PASSWORD: ${{ secrets.JETBRAINS_PRIVATE_KEY_PASSWORD }}
        run: ./gradlew verifyPluginProjectConfiguration publishPlugin --stacktrace
